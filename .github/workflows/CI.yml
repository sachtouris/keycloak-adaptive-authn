name: Build Keycloak Adaptive Authentication extension

on:
  push:
    branches: [ "main" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - keycloak-version: nightly
            extra-args: ""
          - keycloak-version: 26.5.6
            extra-args: -Pdist-maven -Dkeycloak.version=26.5.6

    name: Keycloak ${{ matrix.keycloak-version }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven

    - name: Build extension
      run: ./mvnw clean install -DskipTests -Pbuild-distribution ${{ matrix.extra-args }}

    - name: Test execute 'build' command
      run: ./mvnw -f core exec:exec@build

    - name: Unit tests
      run: ./mvnw -f core test

    - name: Integration tests
      run: ./mvnw -f tests test
